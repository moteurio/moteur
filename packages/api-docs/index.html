<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Moteur API — Scalar</title>
        <!--
          Static Scalar UI for hosting (e.g. docs.api.moteur.io on Cloudflare Pages / Vercel).
          Update data-url if your deployment uses a non-root API base path (e.g. .../api/openapi.json).
          Alternative: run the Moteur API and open {API_BASE_PATH}/docs (same spec as openapi.json).
        -->
    </head>
    <body>
        <script
            id="api-reference"
            data-url="http://localhost:3000/openapi.json"></script>
        <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    </body>
</html>
