name: Release Orchestrator

on:
    workflow_dispatch:
        inputs:
            release_client_cli:
                description: 'Also publish @moteurio/client and @moteurio/cli'
                required: false
                default: 'true'
                type: choice
                options:
                    - 'false'
                    - 'true'
            release_version_override:
                description: 'Optional npm version (same-day republish: e.g. 2026.3.28-2). Empty = UTC calendar date YYYY.M.D'
                required: false
                default: ''
                type: string

permissions:
    contents: write

concurrency:
    group: release-orchestrator
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Set release line from UTC date
              run: |
                  VERSION=$(node scripts/set-release-version-from-date.mjs)
                  echo "EXPECTED_MOTEUR_LINE=$VERSION" >> "$GITHUB_ENV"
                  echo "Release line: $VERSION"
              env:
                  RELEASE_VERSION: ${{ inputs.release_version_override }}

            - name: Prepend CHANGELOG and write release notes
              run: |
                  export RELEASE_NOTES_FILE="$RUNNER_TEMP/release-notes.md"
                  echo "RELEASE_NOTES_FILE=$RELEASE_NOTES_FILE" >> "$GITHUB_ENV"
                  node scripts/prepend-release-changelog.mjs

            - name: Commit release and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add packages/*/package.json CHANGELOG.md
                  if git diff --cached --quiet; then
                    echo "No staged changes; aborting"
                    exit 1
                  fi
                  git commit -m "chore(release): ${EXPECTED_MOTEUR_LINE}"
                  git push origin "HEAD:${GITHUB_REF_NAME}"

            - name: Tag release and push tag
              run: |
                  git tag "moteur@${EXPECTED_MOTEUR_LINE}"
                  git push origin "moteur@${EXPECTED_MOTEUR_LINE}"

            - name: Validate release line policy
              run: node scripts/validate-release-versions.mjs

            - name: Publish @moteurio/types
              run: pnpm --filter @moteurio/types test && pnpm --filter @moteurio/types run build && cd packages/types && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @moteurio/plugin-sdk
              run: pnpm --filter @moteurio/plugin-sdk test && pnpm --filter @moteurio/plugin-sdk run build && cd packages/plugin-sdk && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @moteurio/core
              run: pnpm --filter @moteurio/core test && pnpm --filter @moteurio/core run build && cd packages/core && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @moteurio/ai
              run: pnpm --filter @moteurio/ai test && pnpm --filter @moteurio/ai run build && cd packages/ai && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @moteurio/presence
              run: pnpm --filter @moteurio/presence test && pnpm --filter @moteurio/presence run build && cd packages/presence && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @moteurio/api
              run: pnpm --filter @moteurio/api test && pnpm --filter @moteurio/api run build && cd packages/api && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish optional @moteurio/client
              if: ${{ inputs.release_client_cli == 'true' }}
              run: pnpm --filter @moteurio/client test && pnpm --filter @moteurio/client run build && cd packages/client && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish optional @moteurio/cli
              if: ${{ inputs.release_client_cli == 'true' }}
              run: pnpm --filter @moteurio/cli test && pnpm --filter @moteurio/cli run build && cd packages/cli && npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              run: |
                  gh release create "moteur@${EXPECTED_MOTEUR_LINE}" \
                    --title "moteur ${EXPECTED_MOTEUR_LINE}" \
                    --notes-file "${RELEASE_NOTES_FILE}"
              env:
                  GH_TOKEN: ${{ github.token }}
