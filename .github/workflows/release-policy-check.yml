name: Release Policy Check

on:
    pull_request:
        paths:
            - 'packages/**/package.json'
            - 'scripts/validate-release-versions.mjs'
            - 'VERSIONING.md'
            - '.github/workflows/release-*.yml'
    push:
        branches: [main]
        paths:
            - 'packages/**/package.json'
            - 'scripts/validate-release-versions.mjs'
            - 'VERSIONING.md'
            - '.github/workflows/release-*.yml'

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
            - run: node scripts/validate-release-versions.mjs
